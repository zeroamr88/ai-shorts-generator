name: Generate Video

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python generate_video.py

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: output.mp4
