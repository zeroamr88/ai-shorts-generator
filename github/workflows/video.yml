name: Video Generation Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # الميزة دي بتخليك تقدر تشغل الأكشن يدوي في أي وقت بزرار من الموقع

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
    # 1. عمل كcheckout للكود بتاعك من الستوديو للاكشن
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. إعداد البيئة وتسطيب بايثون
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # نسخة مستقرة وممتازة لـ moviepy

    # 3. تحديث pip وتسطيب المكتبات من ملف requirements.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. تشغيل سكريبت إنتاج الفيديو
    - name: Run Video Generation Script
      run: python generate_video.py
